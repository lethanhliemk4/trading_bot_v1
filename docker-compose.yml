services:
  backend:
    build:
      context: ./backend
    container_name: insight-dashboard-backend
    ports:
      - "8002:8001"
    env_file:
      - ./backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: insight-dashboard-frontend
    ports:
      - "3000:3000"
    environment:
      NUXT_PUBLIC_API_BASE: http://bot.chatquality.io.vn:8002
    depends_on:
      - backend
    restart: unless-stopped